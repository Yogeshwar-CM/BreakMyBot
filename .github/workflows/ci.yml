name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI
        run: pip install -e .

      - name: Run CLI smoke test
        run: python -m breakmybot doctor --config-home /tmp/breakmybot-ci

  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build docs site
        working-directory: apps/web
        run: npm run build

  studio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/studio/package-lock.json

      - name: Install studio dependencies
        working-directory: apps/studio
        run: npm ci

      - name: Build studio
        working-directory: apps/studio
        run: npm run build
