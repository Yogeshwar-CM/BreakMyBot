endpoint:
  url: https://api.example.com/v1/score
  method: POST
  headers:
    Authorization: Bearer ${AI_API_TOKEN}

request:
  template:
    input:
      text: "{{text}}"
  variable: input.text

expectations:
  response_schema:
    type: object
    required:
      - label
      - score

run:
  iterations: 12
  mutations:
    - paraphrase
    - typo
    - boundary_length
    - punctuation

sample_inputs:
  - "This launch email sounds polished and safe."
  - "worst product ever???"
  - ""
  - "Summarize the quarterly update in two bullets."
